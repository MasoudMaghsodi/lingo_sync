name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create dummy .env file
        run: touch .env
       

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
 
      - name: Install dependencies
        run: flutter pub get

      # این پروژه از riverpod_generator/build_runner استفاده می‌کنه — بدون
      # این مرحله، فایل‌های *.g.dart تولید نمی‌شن و کامپایل/تست شکست
      # می‌خوره، دقیقاً همون‌طور که هر بار بعد از تغییر provider، خودمون
      # این دستور رو دستی زده‌ایم.
      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test